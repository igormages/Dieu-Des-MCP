global
    maxconn 4096

defaults
    mode tcp
    timeout connect 30s
    timeout client 120s
    timeout server 120s

# Port 443 public : TLS → Traefik (sites Dokploy), sinon → Squid (proxy MCP)
frontend fe_443_mux
    bind *:443
    tcp-request inspect-delay 5s
    tcp-request content accept
    acl is_tls req.ssl_hello_type 1
    use_backend be_traefik if is_tls
    default_backend be_squid

backend be_traefik
    server traefik 127.0.0.1:8443 check inter 15s fall 2 rise 2

backend be_squid
    server squid 127.0.0.1:3128 check inter 15s fall 2 rise 2
